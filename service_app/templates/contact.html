{% extends 'base.html' %}

{% block title %}Contact Us - Bike Service{% endblock %}

{% block content %}
<div class="glass-panel" style="width: 100%; max-width: 600px; padding: 40px; margin: auto;">
    <h2 style="text-align: center; margin-bottom: 15px;">Get in Touch</h2>
    <p style="text-align: center; color: #ddd; margin-bottom: 30px;">Have questions? We'd love to hear from you.</p>

    <form id="contactForm">
        <label>Your Name</label>
        <input type="text" id="contactName" placeholder="Enter your name" required>

        <label>Email Address</label>
        <input type="email" id="contactEmail" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea id="contactMessage" rows="5" placeholder="How can we help?"
            style="width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 16px;"
            required></textarea>

        <button type="submit" class="btn" style="width: 100%;">Send Message</button>
    </form>
</div>

<script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const name = document.getElementById('contactName').value;
        const email = document.getElementById('contactEmail').value;
        const message = document.getElementById('contactMessage').value;

        const newMessage = {
            name: name,
            email: email,
            message: message,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        // Save to localStorage
        let messages = JSON.parse(localStorage.getItem('messages')) || [];
        messages.push(newMessage);
        localStorage.setItem('messages', JSON.stringify(messages));

        alert('Message sent! We will contact you shortly. You can view the message in the Messages page.');
        this.reset();
    });
</script>
{% endblock %}
