{% extends 'base.html' %}

{% block title %}Contact Us - Bike Service{% endblock %}

{% block content %}
<div class="glass-panel" style="width: 100%; max-width: 600px; padding: 40px; margin: auto;">
    <h2 style="text-align: center; margin-bottom: 15px;">Get in Touch</h2>
    <p style="text-align: center; color: #ddd; margin-bottom: 30px;">Have questions? We'd love to hear from you.</p>

    <form onsubmit="event.preventDefault(); alert('Message sent! We will contact you shortly.');">
        <label>Your Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email Address</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea rows="5" placeholder="How can we help?"
            style="width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 16px;"></textarea>

        <button type="submit" class="btn" style="width: 100%;">Send Message</button>
    </form>
</div>
{% endblock %}
